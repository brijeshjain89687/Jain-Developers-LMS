<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jain Developers LMS</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:sans-serif;background:#08080f;color:#eeeef5;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:32px}.lm{width:60px;height:60px;background:#e94560;border-radius:14px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;color:#fff;margin:0 auto 20px}h1{font-size:32px;font-weight:700;margin-bottom:8px}p{font-size:14px;color:#7777a0;margin-bottom:36px}.btns{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}a{padding:13px 32px;border-radius:10px;font-size:14px;font-weight:600;text-decoration:none;transition:opacity .2s}.primary{background:#e94560;color:#fff}.secondary{background:rgba(255,255,255,.08);color:#fff;border:1px solid rgba(255,255,255,.15)}.primary:hover,.secondary:hover{opacity:.85}.status{margin-top:32px;font-size:12px;color:#5a5a7a}</style>
</head>
<body>
  <div>
    <div class="lm">JD</div>
    <h1>Jain Developers LMS</h1>
    <p>Learn, build, and grow with expert-led courses.</p>
    <div class="btns">
      <a class="primary" href="/student">Student Platform →</a>
      <a class="secondary" href="/admin">Admin Panel</a>
    </div>
    <div class="status" id="status">Checking API…</div>
  </div>
  <script>
    fetch(window.location.origin+'/api/health').then(r=>r.json()).then(d=>{document.getElementById('status').textContent='✓ API Online — Firebase: '+d.project;}).catch(()=>{document.getElementById('status').textContent='⚠ API starting… (~30 sec on first load)';});
    setInterval(()=>fetch(window.location.origin+'/api/health').catch(()=>{}),13*60*1000);
  </script>
</body>
</html>
