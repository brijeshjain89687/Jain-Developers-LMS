services:
  - type: web
    name: jain-lms-api
    runtime: node
    region: singapore
    plan: free
    branch: main
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000

      # ── Firebase Service Account ─────────────────────────────
      # Set these in Render Dashboard → Environment (sync: false = secret)
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_PRIVATE_KEY_ID
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_CLIENT_ID
        sync: false
      - key: FIREBASE_DATABASE_URL
        value: https://jain-lms-f14cd-default-rtdb.firebaseio.com

      # ── GitHub video storage ─────────────────────────────────
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_OWNER
        sync: false
      - key: GITHUB_REPO
        sync: false
      - key: GITHUB_BRANCH
        value: main

      # ── JWT secret for admin panel ───────────────────────────
      - key: JWT_SECRET
        sync: false
